<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Functions Tree 設定</title>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #1f2328;
      --fg-muted: #59636e;
      --bg: #ffffff;
      --border: #d1d9e0;
      --ok: #1a7f37;
      --error: #d1242f;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #f0f6fc;
        --fg-muted: #9198a1;
        --bg: #0d1117;
        --border: #3d444d;
        --ok: #3fb950;
        --error: #f85149;
      }
    }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }
    main { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    h2 { font-size: 16px; margin: 24px 0 8px; }
    .hint { color: var(--fg-muted); font-size: 12px; margin: 4px 0 12px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input[type="password"] {
      flex: 1;
      min-width: 260px;
      padding: 6px 10px;
      font-size: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--fg);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    button {
      padding: 6px 14px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      color: var(--fg);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    button:hover { border-color: var(--fg-muted); }
    .status { font-size: 13px; margin: 12px 0 8px; }
    .status[data-state="saved"] { color: var(--ok); }
    .status[data-state="empty"] { color: var(--fg-muted); }
    .result { font-size: 13px; margin: 12px 0 0; white-space: pre-wrap; }
    .result[data-state="ok"] { color: var(--ok); }
    .result[data-state="error"] { color: var(--error); }
    .result[data-state="loading"] { color: var(--fg-muted); }
  </style>
</head>
<body>
  <main>
    <h1>Functions Tree 設定</h1>
    <p class="hint">GitHub PR ページ上で関数の依存関係グラフを表示する拡張の設定です。</p>

    <h2>GitHub Personal Access Token (PAT)</h2>
    <p class="hint">
      プライベートリポジトリの閲覧と API レート制限の緩和（60 → 5,000 req/h）に使います。
      fine-grained PAT なら <code>Contents</code> / <code>Pull requests</code> の Read 権限で十分です。
      トークンはこの端末の <code>chrome.storage.local</code> にのみ保存され、外部に送信されません
      （送信先は api.github.com のみ）。
    </p>
    <p id="pat-status" class="status"></p>
    <div class="row">
      <input id="pat-input" type="password" placeholder="ghp_… / github_pat_…" autocomplete="off" />
      <button id="save" type="button">保存</button>
      <button id="delete" type="button">削除</button>
      <button id="test" type="button">接続テスト</button>
    </div>
    <p id="test-result" class="result"></p>
  </main>
  <script src="options.js"></script>
</body>
</html>
